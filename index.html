<script>
const vkfsForm = document.getElementById("vkfs-contact-form");
const vkfsSuccess = document.getElementById("vkfs-success-message");

vkfsForm.addEventListener("submit", async function(e){
    e.preventDefault();
    const formData = new FormData(vkfsForm);

    const response = await fetch(vkfsForm.action,{
        method: vkfsForm.method,
        body: formData,
        headers:{ 'Accept':'application/json' }
    });

    if(response.ok){
        vkfsForm.reset();
        vkfsSuccess.style.display = "block";
    }else{
        alert("Oops! Something went wrong.");
    }
});

const vkchatxToggle = document.getElementById("vkchatx-toggle");
const vkchatxPopup = document.getElementById("vkchatx-popup");
const vkchatxForm = document.getElementById("vkchatx-form");
const vkchatxSuccess = document.getElementById("vkchatx-success");

vkchatxToggle.addEventListener("click",()=>{
    vkchatxPopup.style.display =
        vkchatxPopup.style.display === "block" ? "none" : "block";
});

vkchatxForm.addEventListener("submit", async function(e){
    e.preventDefault();
    const formData = new FormData(vkchatxForm);

    const response = await fetch(vkchatxForm.action,{
        method: vkchatxForm.method,
        body: formData,
        headers:{'Accept':'application/json'}
    });

    if(response.ok){
        vkchatxForm.reset();
        vkchatxSuccess.style.display="block";
    }else{
        alert("Something went wrong!");
    }
});
</script>
